<!DOCTYPE html>
<html lang="en">
    <!--new change-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FoodHub - Online Food Ordering{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% if user %}
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="{{ url_for('index') }}" class="brand-name">🍕 FoodHub</a>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}" class="nav-link">🏠 Home</a></li>
                <li><a href="{{ url_for('cart') }}" class="nav-link">🛒 Cart</a></li>
                <li><a href="{{ url_for('wishlist') }}" class="nav-link">❤️ Wishlist</a></li>
                <li><a href="{{ url_for('orders') }}" class="nav-link">📋 Orders</a></li>
                <li class="nav-user">
                    <span class="user-name">👤 {{ user.username }}</span>
                    <a href="{{ url_for('logout') }}" class="nav-link logout-btn">Logout</a>
                </li>
                <li>
                    <button class="theme-toggle" onclick="toggleDarkMode()">🌙</button>
                </li>
            </ul>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2024 FoodHub - Your Favorite Food ordering Platform</p>
    </footer>

    <script>
        // Dark mode functionality
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
